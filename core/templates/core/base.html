<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Reconhecimento Facial{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background-color: #f0f4f8; }
    .navbar { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); }
    .card { border: none; box-shadow: 0 4px 20px rgba(0,0,0,.08); border-radius: 12px; }
    .btn-primary { background: linear-gradient(135deg, #0f3460, #533483); border: none; }
    .btn-primary:hover { background: linear-gradient(135deg, #533483, #0f3460); }
    .badge-label { font-size: .65rem; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container">
      <a class="navbar-brand fw-bold" href="{% url 'index' %}">
        <i class="bi bi-person-bounding-box me-2"></i>FaceID
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="{% url 'index' %}"><i class="bi bi-house me-1"></i>Início</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{% url 'cadastrar' %}"><i class="bi bi-person-plus me-1"></i>Cadastrar</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{% url 'lista_pessoas' %}"><i class="bi bi-people me-1"></i>Pessoas</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{% url 'reconhecer' %}"><i class="bi bi-camera-video me-1"></i>Reconhecer</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container pb-5">
    {% if messages %}
      {% for msg in messages %}
        <div class="alert alert-{{ msg.tags }} alert-dismissible fade show" role="alert">
          {{ msg }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
